
<script>
function generateInvoice() {
    const text = document.querySelector("textarea").value;

    const lines = text.split("\n");

    let subtotal = 0;
    let tableHTML = "";

    lines.forEach(line => {
        // Match YOUR format: Qty EA Price Total
        let match = line.match(/(\d+\.?\d*)\s+EA\s+(\d+\.?\d*)\s+(\d+\.?\d*)/);

        if (match) {
            let qty = parseFloat(match[1]);
            let price = parseFloat(match[2]);
            let total = parseFloat(match[3]);

            subtotal += total;

            tableHTML += `
                <tr>
                    <td>-</td>
                    <td>${qty}</td>
                    <td>£${price.toFixed(2)}</td>
                    <td>£${total.toFixed(2)}</td>
                </tr>
            `;
        }
    });

    const vat = subtotal * 0.20;
    const grandTotal = subtotal + vat;

    document.querySelector("#items").innerHTML = tableHTML;
    document.querySelector("#subtotal").innerText = "£" + subtotal.toFixed(2);
    document.querySelector("#vat").innerText = "£" + vat.toFixed(2);
    document.querySelector("#total").innerText = "£" + grandTotal.toFixed(2);
}
</script>
